{% extends "base.html" %}

{% block title %}Crear Checklist - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">🏠 Volver al Panel</a>
</div>
<h1>Crear Checklist</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" name="titulo" required>
        </div>
        
        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" rows="4"></textarea>
        </div>
        
        <h3>Items de la Checklist</h3>
        <div id="items-container">
            <div class="item-row">
                <input type="text" name="criterio" placeholder="Criterio del item" required>
                <select name="item_tipo">
                    <option value="boolean">Sí/No</option>
                    <option value="numerico">Numérico (0-100)</option>
                </select>
            </div>
        </div>
        
        <button type="button" id="add-item" class="btn btn-outline">Agregar Item</button>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>

<script>
document.getElementById('add-item').addEventListener('click', function() {
    const container = document.getElementById('items-container');
    const newRow = document.createElement('div');
    newRow.className = 'item-row';
    newRow.innerHTML = `
        <input type="text" name="criterio" placeholder="Criterio del item" required>
        <select name="item_tipo">
            <option value="boolean">Sí/No</option>
            <option value="numerico">Numérico (0-100)</option>
        </select>
    `;
    container.appendChild(newRow);
});
</script>
{% endblock %}
