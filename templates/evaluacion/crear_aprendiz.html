{% extends "base.html" %}

{% block title %}Crear Aprendiz - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'home' %}" class="btn btn-outline">🏠 Volver al inicio</a>
</div>
<h1>Crear Aprendiz</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="documento">Documento</label>
                <input type="text" id="documento" name="documento" required>
            </div>
            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono">
            </div>
            <div class="form-group">
                <label for="programa">Programa</label>
                <input type="text" id="programa" name="programa" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="trimestre">Trimestre</label>
                <select id="trimestre" name="trimestre" required>
                    <option value="" selected disabled>Selecciona trimestre</option>
                    {% for i in "12345678910"|make_list %}
                        <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
                <small class="form-text text-muted">Rango: 1 al 10</small>
            </div>
            <div class="form-group">
                <label for="ficha">Ficha</label>
                <input type="text" id="ficha" name="ficha" required>
            </div>
        </div>

        
        <div class="form-row">
            <div class="form-group">
                <label for="fecha_nacimiento">Fecha Nacimiento</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
            </div>
            <div class="form-group">
                <label for="direccion">Dirección</label>
                <textarea id="direccion" name="direccion" rows="2"></textarea>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Aprendiz</button>
            <a href="{% url 'lista_aprendices' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
