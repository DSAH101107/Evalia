{% extends "base.html" %}

{% block title %}Crear GAES - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">🏠 Volver al Panel</a>
</div>
<h1>Crear GAES</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="nombre">Nombre del GAES</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" rows="3"></textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear GAES</button>
            <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
