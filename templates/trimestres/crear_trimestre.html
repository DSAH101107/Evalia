{% extends "base.html" %}

{% block title %}Crear Trimestre - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">🏠 Volver al Panel</a>
</div>
<h1>Crear Trimestre</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="numero">Número</label>
                <input type="number" id="numero" name="numero" min="1" max="7" required>
            </div>
            <div class="form-group">
                <label for="anio">Año</label>
                <input type="number" id="anio" name="anio" value="{% now 'Y' %}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="nombre">Nombre (opcional)</label>
                <input type="text" id="nombre" name="nombre">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="fecha_inicio">Fecha Inicio</label>
                <input type="date" id="fecha_inicio" name="fecha_inicio">
            </div>
            <div class="form-group">
                <label for="fecha_fin">Fecha Fin</label>
                <input type="date" id="fecha_fin" name="fecha_fin">
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear Trimestre</button>
            <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
