{% extends "base.html" %}

{% block title %}Editar Trimestre - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'detalle_trimestre' trimestre.pk %}" class="btn btn-outline">↩️ Volver</a>
</div>
<h1>Editar Trimestre</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="numero">Número</label>
                <input type="number" id="numero" name="numero" value="{{ trimestre.numero }}" min="1" max="7" required>
            </div>
            <div class="form-group">
                <label for="anio">Año</label>
                <input type="number" id="anio" name="anio" value="{{ trimestre.anio }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" value="{{ trimestre.nombre }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{% url 'detalle_trimestre' trimestre.pk %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
