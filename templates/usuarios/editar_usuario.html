{% extends "base.html" %}

{% block title %}Editar Usuario - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'home' %}" class="btn btn-outline">🏠 Volver al inicio</a>
</div>
<h1>Editar Usuario: {{ usuario.username }}</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" value="{{ usuario.username }}" readonly>
            </div>
            <div class="form-group">
                <label for="password">Nueva Contraseña (opcional)</label>
                <input type="password" id="password" name="password" placeholder="Dejar vacío para no cambiar">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ usuario.email|default:'' }}" required>
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="administrador" {% if usuario.rol == 'administrador' %}selected{% endif %}>Administrador</option>
                    <option value="instructor" {% if usuario.rol == 'instructor' %}selected{% endif %}>Instructor</option>
                    <option value="jurado" {% if usuario.rol == 'jurado' %}selected{% endif %}>Jurado</option>
                    <option value="aprendiz" {% if usuario.rol == 'aprendiz' %}selected{% endif %}>Aprendiz</option>
                </select>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Actualizar Usuario</button>
            <a href="{% url 'lista_usuarios_por_grupos' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
