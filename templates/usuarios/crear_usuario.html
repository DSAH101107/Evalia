{% extends "base.html" %}

{% block title %}Crear Usuario - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'home' %}" class="btn btn-outline">🏠 Volver al inicio</a>
</div>
<h1>Crear Usuario</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" maxlength="8" pattern="^(?=.*[^A-Za-z0-9&apos;&quot;])(?=.{6,8}$).*$" value="{{ form_data.password|default:'' }}">
                <small>Debe tener entre 6 y 8 caracteres e incluir un símbolo especial distinto a comillas.</small>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="administrador">Administrador</option>
                    <option value="instructor">Instructor</option>
                    <option value="jurado">Jurado</option>
                    <option value="aprendiz">Aprendiz</option>
                </select>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear Usuario</button>
            <a href="{% url 'lista_usuarios_por_grupos' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
