{% extends "base.html" %}

{% block title %}Crear Fase - Sistema SENA{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">🏠 Volver al Panel</a>
</div>
<h1>Crear Fase</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="numero">Número de Fase</label>
                <input type="number" id="numero" name="numero" min="1" max="7" required>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Fase 1">
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear Fase</button>
            <a href="{% url 'dashboard_admin' %}" class="btn btn-outline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
